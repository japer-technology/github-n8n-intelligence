name: Fetch n8n Workflow Templates

on:
  workflow_dispatch:
    inputs:
      resume:
        description: 'Resume mode — skip already-downloaded templates'
        required: false
        type: boolean
        default: true
      batch_size:
        description: 'Max templates to download per run (0 = unlimited)'
        required: false
        type: number
        default: 1000
  schedule:
    # Run weekly on Sunday at 04:00 UTC
    - cron: '0 4 * * 0'

permissions:
  contents: write

jobs:
  fetch-templates:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Fetch n8n workflow templates
        run: |
          FLAGS=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.resume }}" = "true" ]; then
            FLAGS="--resume"
          fi
          BATCH="${{ inputs.batch_size }}"
          if [ -z "$BATCH" ]; then
            BATCH=1000
          fi
          if [ "$BATCH" != "0" ]; then
            FLAGS="$FLAGS --batch-size $BATCH"
          fi
          node scripts/fetch-n8n-templates.mjs $FLAGS

      - name: Count fetched templates
        id: count
        run: |
          COUNT=$(find workflows/templates -name '*.json' ! -name 'catalog.json' | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "📦 Total template files: $COUNT"

      - name: Commit fetched templates
        run: |
          git config user.name "n8n-bot[action]"
          git config user.email "n8n-bot[action]@users.noreply.github.com"
          git add workflows/templates/
          if git diff --cached --quiet; then
            echo "No new templates to commit"
          else
            git commit -m "chore: update n8n workflow templates (${{ steps.count.outputs.count }} total)"
            git push
          fi
